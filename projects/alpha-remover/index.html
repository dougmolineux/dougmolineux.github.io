<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store PNG Alpha Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone--over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">PNG Alpha Remover</h1>
            <p class="text-gray-600">Remove transparency from App Store screenshots to avoid "Alpha Channel" errors.</p>
        </header>

        <!-- Upload Area -->
        <div 
            id="dropZone"
            class="border-4 border-dashed border-gray-200 rounded-2xl p-12 text-center transition-all cursor-pointer bg-white hover:border-blue-400"
        >
            <input type="file" id="fileInput" multiple accept="image/png" class="hidden">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <p class="text-lg font-medium text-gray-700">Drop PNG files here or <span class="text-blue-600">click to browse</span></p>
                <p class="text-sm text-gray-500 mt-2">Only PNG files are processed. Max resolution depends on your browser memory.</p>
            </div>
        </div>

        <!-- Controls -->
        <div id="controls" class="hidden mt-8 flex justify-between items-center bg-white p-4 rounded-lg shadow-sm">
            <span id="stats" class="text-sm font-medium text-gray-700">0 files selected</span>
            <div class="space-x-2">
                <button id="clearBtn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800">Clear All</button>
                <button id="downloadAllBtn" class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-semibold hover:bg-blue-700 transition-colors">Download All</button>
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 mt-8">
            <!-- Items injected here -->
        </div>
    </div>

    <!-- Hidden Canvas for Processing -->
    <canvas id="procCanvas" class="hidden"></canvas>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const resultsGrid = document.getElementById('resultsGrid');
        const controls = document.getElementById('controls');
        const stats = document.getElementById('stats');
        const clearBtn = document.getElementById('clearBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const procCanvas = document.getElementById('procCanvas');
        const ctx = procCanvas.getContext('2d', { alpha: false }); // Force non-alpha context

        let processedFiles = [];

        // --- Event Listeners ---

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => {
                dropZone.classList.remove('drop-zone--over');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length > 0) {
                handleFiles(e.dataTransfer.files);
            }
        });

        clearBtn.addEventListener('click', () => {
            processedFiles.forEach(file => URL.revokeObjectURL(file.blobUrl)); // Cleanup memory
            processedFiles = [];
            resultsGrid.innerHTML = '';
            controls.classList.add('hidden');
        });

        downloadAllBtn.addEventListener('click', () => {
            processedFiles.forEach((file, index) => {
                setTimeout(() => {
                    triggerDownload(file.blobUrl, `no-alpha-${file.name}`);
                }, index * 300); // Staggered to help browser handle multiple prompts
            });
        });

        // Helper to trigger download
        function triggerDownload(url, filename) {
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Core Processing Logic ---

        async function handleFiles(files) {
            const fileList = Array.from(files).filter(f => f.type === 'image/png');
            if (fileList.length === 0) return;

            controls.classList.remove('hidden');
            
            for (const file of fileList) {
                const result = await processImage(file);
                processedFiles.push(result);
                renderThumbnail(result);
            }

            stats.textContent = `${processedFiles.length} files processed`;
        }

        function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        procCanvas.width = img.width;
                        procCanvas.height = img.height;

                        // Fill white background to ensure no transparency
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, procCanvas.width, procCanvas.height);

                        // Draw image (blends alpha into white because context alpha is false)
                        ctx.drawImage(img, 0, 0);

                        // Convert to Blob instead of DataURL to bypass CSP restrictions
                        procCanvas.toBlob((blob) => {
                            const blobUrl = URL.createObjectURL(blob);
                            resolve({
                                name: file.name,
                                blobUrl: blobUrl,
                                width: img.width,
                                height: img.height
                            });
                        }, 'image/png');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderThumbnail(fileObj) {
            const card = document.createElement('div');
            card.className = "bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center";
            
            card.innerHTML = `
                <div class="w-full h-40 bg-gray-100 rounded-lg overflow-hidden mb-3 flex items-center justify-center">
                    <img src="${fileObj.blobUrl}" class="max-w-full max-h-full object-contain">
                </div>
                <div class="w-full">
                    <p class="text-xs font-mono text-gray-500 truncate mb-1">${fileObj.name}</p>
                    <p class="text-xs text-gray-400 mb-3">${fileObj.width} × ${fileObj.height} px</p>
                    <button class="dl-single-btn w-full py-2 bg-gray-800 text-white rounded-md text-xs font-bold hover:bg-black transition-colors">
                        Download
                    </button>
                </div>
            `;

            card.querySelector('.dl-single-btn').onclick = () => {
                triggerDownload(fileObj.blobUrl, `no-alpha-${fileObj.name}`);
            };

            resultsGrid.appendChild(card);
        }
    </script>
</body>
</html>
